serenity {
  take.screenshots = AFTER_EACH_STEP
  restart.browser.for.each = scenario
  console.colors = true
  logging = VERBOSE
}

headless.mode = false

webdriver {
  driver = chrome

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "start-maximized",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",
        "disable-extensions",
        "disable-web-security",
        "disable-translate",
        "disable-logging"
      ]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }
}

# Configuración SauceDemo (Credenciales fuera del Gherkin)
