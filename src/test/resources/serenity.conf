serenity {
  project.name = "EscuelaTestingFinalWeb - SauceDemo"
  take.screenshots = AFTER_EACH_STEP
  restart.browser.for.each = NEVER
  console.colors = true
  report.show.manual.tests = false
}

# Puedes cambiarlo por consola:
# mvn clean verify -Dheadless.mode=true
headless.mode = false

webdriver {
  driver = chrome

  timeouts {
    implicitlywait = 0
    fluentwait = 30
  }

  wait.for.timeout = 30000

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "start-maximized",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",
        "disable-extensions",
        "disable-web-security",
        "disable-translate",
        "disable-logging"
      ]
    }
  }
}

# =========================
# Datos de la app (SauceDemo)
# =========================
saucedemo {
  url = "https://www.saucedemo.com"

  users {
    standard {
      username = "standard_user"
      password = "secret_sauce"
    }
    locked {
      username = "locked_out_user"
      password = "secret_sauce"
    }
    problem {
      username = "problem_user"
      password = "secret_sauce"
    }
    performance {
      username = "performance_glitch_user"
      password = "secret_sauce"
    }
    error {
      username = "error_user"
      password = "secret_sauce"
    }
    visual {
      username = "visual_user"
      password = "secret_sauce"
    }
    invalid {
      username = "usuario_invalido"
      password = "password_incorrecto"
    }
  }
}

# =========================
# Timeouts extra (opcional)
# =========================
webdriver.wait.for.angular.timeout = 30000
serenity.timeout = 30000